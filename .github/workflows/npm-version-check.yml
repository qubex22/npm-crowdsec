# =============================================================================
# Weekly Nginx Proxy Manager Version Check & Image Build
# =============================================================================
#
# On schedule (weekly) and on manual dispatch:
#   1. Checks the latest jc21/nginx-proxy-manager version on Docker Hub.
#   2. Compares against the last-built version (.npm-version).
#   3. If a newer version is available, builds and pushes a new image.
#
# Required secrets (set in repository Settings > Secrets and variables):
#   DOCKER_REGISTRY    — Registry URL (e.g. ghcr.io, docker.io/myuser)
#   DOCKER_USERNAME    — Registry username
#   DOCKER_PASSWORD    — Registry password / access token
#
# The image is pushed as:
#   <DOCKER_REGISTRY>/npm-crowdsec:<npm-version>-<bouncer-version>
#   <DOCKER_REGISTRY>/npm-crowdsec:latest
# =============================================================================

name: NPM Version Check & Build

permissions:
  contents: write
  packages: write

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if no new version"
        type: boolean
        default: false
      crowdsec_version:
        description: "Override CrowdSec bouncer version"
        type: string

env:
  IMAGE_NAME: npm-crowdsec

jobs:
  check-and-build:
    name: Check Version & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # ------------------------------------------------------------------
      # Step 1: Determine if we need to build
      # ------------------------------------------------------------------
      - name: Check for NPM version updates
        id: check
        run: |
          NPM_VERSION=""
          BOUNCER_VERSION="${{ github.event.inputs.crowdsec_version || '1.1.3' }}"
          FORCE="${{ github.event.inputs.force_build || 'false' }}"

          # Fetch latest NPM version from Docker Hub
          RESPONSE=$(curl -s "https://hub.docker.com/v2/repositories/jc21/nginx-proxy-manager/tags/?page_size=100&ordering=last_updated")

          # Get the latest versioned tag (e.g. 2.15.1, not 'latest')
          VERSION_TAG=$(echo "$RESPONSE" | jq -r '.results[] | select(.name | test("^[0-9]+\\.[0-9]+\\.[0-9]+$")) | .name' | sort -V | tail -1)

          if [ -z "$VERSION_TAG" ]; then
            echo "::warning::Could not parse version tag from Docker Hub. Falling back to 'latest'."
            VERSION_TAG="latest"
          fi

          NPM_VERSION="$VERSION_TAG"
          echo "Latest NPM version: $NPM_VERSION"

          # Read the last built version (if exists)
          LAST_NPM=""
          LAST_BOUNCER=""
          if [ -f .npm-version ]; then
            LAST_NPM=$(grep '^npm_version=' .npm-version | cut -d'=' -f2)
            LAST_BOUNCER=$(grep '^bouncer_version=' .npm-version | cut -d'=' -f2)
            echo "Last built: NPM=$LAST_NPM, CrowdSec=$LAST_BOUNCER"
          else
            echo "No .npm-version file found — first build."
          fi

          # Determine if we should build
          SHOULD_BUILD="false"
          TAG="latest"

          if [ "$FORCE" = "true" ]; then
            SHOULD_BUILD="true"
            TAG="latest-force-$(date +%Y%m%d)"
            echo "Force build requested."
          elif [ -z "$LAST_NPM" ] || [ "$NPM_VERSION" != "$LAST_NPM" ]; then
            SHOULD_BUILD="true"
            TAG="${NPM_VERSION}-cs${BOUNCER_VERSION}"
            echo "NPM version changed: $LAST_NPM -> $NPM_VERSION"
          elif [ -n "$LAST_BOUNCER" ] && [ "$BOUNCER_VERSION" != "$LAST_BOUNCER" ]; then
            SHOULD_BUILD="true"
            TAG="${NPM_VERSION}-cs${BOUNCER_VERSION}"
            echo "CrowdSec version changed: $LAST_BOUNCER -> $BOUNCER_VERSION"
          else
            echo "No new version available. Skipping build."
          fi

          # Write outputs
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "npm_version=$NPM_VERSION" >> "$GITHUB_OUTPUT"
          echo "bouncer_version=$BOUNCER_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Step 2: Set up Docker Buildx (only if building)
      # ------------------------------------------------------------------
      - name: Set up Docker Buildx
        if: steps.check.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------------
      # Step 3: Log in to Docker Registry (only if building)
      # ------------------------------------------------------------------
      - name: Log in to Docker Registry
        if: steps.check.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY || 'ghcr.io' }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ------------------------------------------------------------------
      # Step 4: Extract metadata (only if building)
      # ------------------------------------------------------------------
      - name: Extract Docker metadata
        if: steps.check.outputs.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_REGISTRY || 'ghcr.io' }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.check.outputs.tag }}
            type=raw,value=latest
            type=raw,value=${{ steps.check.outputs.npm_version }}-cs${{ steps.check.outputs.bouncer_version }}

      # ------------------------------------------------------------------
      # Step 5: Build and push (only if building)
      # ------------------------------------------------------------------
      - name: Build and push image
        if: steps.check.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CROWDSEC_OPENRESTY_BOUNCER_VERSION=${{ steps.check.outputs.bouncer_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ------------------------------------------------------------------
      # Step 6: Update version tracker (only if built successfully)
      # ------------------------------------------------------------------
      - name: Update version tracker
        if: steps.check.outputs.should_build == 'true'
        run: |
          cat > .npm-version << EOF
          npm_version=${{ steps.check.outputs.npm_version }}
          bouncer_version=${{ steps.check.outputs.bouncer_version }}
          built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          commit=${{ github.sha }}
          EOF

      # ------------------------------------------------------------------
      # Step 7: Commit version update (only if built successfully)
      # ------------------------------------------------------------------
      - name: Commit version update
        if: steps.check.outputs.should_build == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: .npm-version
          commit_message: "ci: update version tracker (${{ steps.check.outputs.npm_version }}-cs${{ steps.check.outputs.bouncer_version }})"
          branch: main

      # ------------------------------------------------------------------
      # Step 8: Create GitHub Release (only if built successfully)
      # ------------------------------------------------------------------
      - name: Create GitHub Release
        if: steps.check.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.tag }}
          name: "npm-crowdsec ${{ steps.check.outputs.npm_version }} (CrowdSec ${{ steps.check.outputs.bouncer_version }})"
          body: |
            Automatic build triggered by upstream NPM version update.

            | Component | Version |
            |---|---|
            | Nginx Proxy Manager | ${{ steps.check.outputs.npm_version }} |
            | CrowdSec OpenResty Bouncer | ${{ steps.check.outputs.bouncer_version }} |

            **Base image:** jc21/nginx-proxy-manager:${{ steps.check.outputs.npm_version }}

            **Pull:**
            ```
            docker pull ${{ secrets.DOCKER_REGISTRY || 'ghcr.io' }}/${{ env.IMAGE_NAME }}:${{ steps.check.outputs.tag }}
            ```
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
